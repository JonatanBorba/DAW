<h2>Proyectos</h2>

<a routerLink="/proyectos/nuevo">
  Nuevo Proyecto
</a>

<br><br>

<p>Cantidad: {{ proyectos.length }}</p>

<table border="1" width="100%">

  <thead>

    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Estado</th>
      <th>Cliente</th>
      <th>Acciones</th>
    </tr>

  </thead>

  <tbody>

    @for (p of proyectos; track p.id) {

      <tr>

        <td>{{ p.id }}</td>
        <td>{{ p.nombre }}</td>
        <td>{{ p.estado }}</td>
        <td>{{ p.cliente?.nombre || 'Interno' }}</td>

        <td>

          <a [routerLink]="['/proyectos/editar', p.id]">
            Editar
          </a>

        </td>

      </tr>

    }

  </tbody>

</table>
