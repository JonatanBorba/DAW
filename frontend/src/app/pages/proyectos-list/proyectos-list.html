<app-template>
  <div class="acciones-superiores">
    <p-button
      id="boton-crear-proyecto"
      icon="pi pi-plus"
      label="Crear Proyecto"
      (click)="crearProyecto()"
    ></p-button>

    <p-button
      id="boton-ver-estadisticas"
      icon="pi pi-chart-bar"
      label="Ver estadísticas"
      styleClass="p-button-secondary"
      (click)="irAEstadisticas()"
    ></p-button>
  </div>

  <p-table
    id="tabla"
    [value]="proyectos"
    [tableStyle]="{ 'min-width': '50rem' }"
    [scrollable]="true"
    scrollHeight="70vh"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Cliente</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-proyecto>
      <tr>
        <td>{{ proyecto.nombre }}</td>
        <td>{{ proyecto.cliente ? proyecto.cliente.nombre : 'Interno' }}</td>
        <td>{{ proyecto.estado }}</td>
        <td>
          <p-button
            id="boton-gestionar-tareas"
            icon="pi pi-list"
            pTooltip="Gestionar Tareas"
            (click)="gestionarTareas(proyecto)"
          ></p-button>

          <p-button
            id="boton-editar-proyecto"
            icon="pi pi-pencil"
            pTooltip="Editar Proyecto"
            (click)="editarProyecto(proyecto)"
          ></p-button>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4">No se encontraron proyectos.</td>
      </tr>
    </ng-template>
  </p-table>
</app-template>

<app-gestion-proyecto
  [(visible)]="dialogVisible"
  [(proyectoSeleccionado)]="proyectoSeleccionado"
  (guardado)="cargarProyectos()"
></app-gestion-proyecto>
